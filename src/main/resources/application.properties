spring.application.name=PetFinder

# ------------------------------------------------------------------
# DATASOURCE
# Usa las variables de entorno que inyecta docker-compose
# (SPRING_DATASOURCE_URL/USERNAME/PASSWORD). Los valores tras ":" son
# el fallback para cuando corras el backend fuera de Docker, en local,
# apuntando al Postgres publicado en el puerto 5432.
# ------------------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petfinder_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------------
# JPA / HIBERNATE
# ------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# evita que las vistas/serializadores disparen lazy-loading fuera de la transacción
spring.jpa.open-in-view=false

# ------------------------------------------------------------------
# POOL DE CONEXIONES (HikariCP, viene incluido con Spring Boot)
# ------------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ------------------------------------------------------------------
# SERVIDOR
# ------------------------------------------------------------------
server.port=8080